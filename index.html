<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shivam Travels | Premium Taxi</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#fff;
}

/* HEADER */
header{
background:linear-gradient(90deg,#000,#222,#ffc107);
padding:40px;
text-align:center;
}

header h1{
margin:0;
color:#ffc107;
}

/* BOX */
.box{
background:#111;
margin:15px;
padding:20px;
border-radius:15px;
border:1px solid #ffc107;
}

/* INPUT */
input,select,textarea{
width:100%;
padding:10px;
margin:5px 0;
border-radius:5px;
border:none;
}

/* BUTTON */
.btn{
background:#ffc107;
color:#000;
padding:10px;
border:none;
border-radius:5px;
font-weight:bold;
cursor:pointer;
}

/* FLOAT */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25d366;
padding:15px;
border-radius:50%;
}

.callbtn{
position:fixed;
bottom:80px;
right:20px;
background:red;
padding:12px;
border-radius:50%;
}

/* POPUP */
#popup,#reviewPopup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
}

.popup-box{
background:#111;
border:1px solid #ffc107;
width:80%;
max-width:350px;
margin:120px auto;
padding:20px;
border-radius:15px;
text-align:center;
}
</style>

<script>

/* TRIP */
function showTripInfo(){
var trip=document.getElementById("trip").value;

if(trip=="Round Trip"){
document.getElementById("tripInfo").innerHTML=
"✔ 300KM/Day + Driver D.A + Toll + Parking Extra";

document.getElementById("fareBox").style.display="block";
document.getElementById("days").style.display="block";

}else{
document.getElementById("tripInfo").innerHTML="";
document.getElementById("fareBox").style.display="none";
document.getElementById("days").style.display="none";
}
}

/* FARE */
function calculateFare(){

var km=parseInt(document.getElementById("km").value)||0;
var days=parseInt(document.getElementById("days").value)||1;
var car=document.getElementById("car").value;

var rate=10;
if(car=="Ertiga") rate=13;
if(car=="Innova") rate=18;
if(car=="Innova Crysta") rate=19;

var minKM=300*days;
if(km<minKM) km=minKM;

var driver=300*days;
var total=(km*rate)+driver;

document.getElementById("result").innerHTML="💰 ₹ "+total;
}

/* BOOKING */
function sendWhatsApp(){

var name=document.getElementById("name").value;
var trip=document.getElementById("trip").value;
var car=document.getElementById("carType").value;
var pickup=document.getElementById("pickup").value;
var drop=document.getElementById("drop").value;

var msg="🚕 Taxi Booking%0A"
+"Name:"+name+"%0A"
+"Trip:"+trip+"%0A"
+"Car:"+car+"%0A"
+"Pickup:"+pickup+"%0A"
+"Drop:"+drop;

window.open("https://wa.me/919898222313?text="+msg);

document.getElementById("popupText").innerHTML=
name+"<br>"+pickup+" ➜ "+drop;

document.getElementById("popup").style.display="block";
}

/* REVIEW */
function addReview(){
var name=document.getElementById("custName").value;
var rating=document.getElementById("rating").value;
var text=document.getElementById("reviewText").value;

var html="<p><b>"+name+"</b> ⭐"+rating+"<br>"+text+"</p>";
document.getElementById("reviewList").innerHTML+=html;

closeReviewPopup();
}

/* POPUP */
function closePopup(){document.getElementById("popup").style.display="none";}
function openReviewPopup(){document.getElementById("reviewPopup").style.display="block";}
function closeReviewPopup(){document.getElementById("reviewPopup").style.display="none";}

window.onload=function(){
setTimeout(openReviewPopup,4000);
}

</script>

</head>

<body>

<header>
<h1>🚕 Shivam Travels</h1>
<p>⭐ Premium Taxi Service</p>
</header>

<!-- BOOK -->
<div class="box">
<h2>Book Taxi</h2>

<input id="name" placeholder="Name">

<select id="trip" onchange="showTripInfo()">
<option>One Way</option>
<option>Round Trip</option>
</select>

<p id="tripInfo" style="color:#ffc107;"></p>

<select id="carType">
<option>Dzire</option>
<option>Aura</option>
<option>Ertiga</option>
<option>Innova</option>
<option>Innova Crysta</option>
</select>

<input list="city" id="pickup" placeholder="Pickup City">
<input list="city" id="drop" placeholder="Drop City">

<datalist id="city">
<option>Sihor</option>
<option>Bhavnagar</option>
<option>Surat</option>
<option>Ahmedabad</option>
</datalist>

<button class="btn" onclick="sendWhatsApp()">Book Now</button>
</div>

<!-- FARE -->
<div class="box" id="fareBox" style="display:none;">
<h2>Fare Calculator (Round Trip)</h2>

<input id="km" placeholder="Enter KM">
<input id="days" placeholder="Days" style="display:none;">

<select id="car" onchange="calculateFare()">
<option>Dzire</option>
<option>Aura</option>
<option>Ertiga</option>
<option>Innova</option>
<option>Innova Crysta</option>
</select>

<button class="btn" onclick="calculateFare()">Calculate</button>

<p id="result"></p>
</div>

<!-- PAYMENT -->
<div class="box">
<h2>💰 Pay Online</h2>

<p style="color:#ffc107;font-weight:bold;">
UPI ID: chauhanshivam2535-1@okicici
</p>

<a href="upi://pay?pa=chauhanshivam2535-1@okicici&pn=Shivam%20Travels&cu=INR">
<button class="btn">Pay Now</button>
</a>

</div>

<!-- REVIEW -->
<div class="box">
<h2>⭐ Customer Reviews</h2>

<input id="custName" placeholder="Name">
<select id="rating">
<option value="5">⭐⭐⭐⭐⭐</option>
<option value="4">⭐⭐⭐⭐</option>
<option value="3">⭐⭐⭐</option>
<option value="2">⭐⭐</option>
<option value="1">⭐</option>
</select>

<textarea id="reviewText"></textarea>

<button class="btn" onclick="addReview()">Submit</button>

<div id="reviewList"></div>
</div>

<footer style="text-align:center;padding:10px;">
© Shivam Travels
</footer>

<a href="https://wa.me/919898222313" class="whatsapp">💬</a>
<a href="tel:9898222313" class="callbtn">📞</a>

<!-- POPUP -->
<div id="popup">
<div class="popup-box">
<h3>Booking Confirmed</h3>
<p id="popupText"></p>
<button class="btn" onclick="closePopup()">OK</button>
</div>
</div>

<div id="reviewPopup">
<div class="popup-box">
<h3>Give Review</h3>
<button class="btn" onclick="closeReviewPopup()">Close</button>
</div>
</div>

</body>
</html>
