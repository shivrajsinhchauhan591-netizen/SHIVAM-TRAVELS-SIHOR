<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shivam Travels | Final</title>

<style>
body{margin:0;font-family:Arial;background:#0a0f2c;color:#fff;}

/* HEADER */
header{
background:linear-gradient(90deg,#0a0f2c,#1e3a8a,#3b82f6);
padding:40px;text-align:center;
}
h1,h2,h3{font-weight:bold;}

/* BOX */
.box{
background:#111c44;
margin:15px;
padding:20px;
border-radius:15px;
border:1px solid #3b82f6;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

/* INPUT */
input,select,textarea{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:5px;
}

/* BUTTON */
.btn{
background:#3b82f6;
color:#fff;
padding:12px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
width:100%;
margin-top:5px;
}
.btn:hover{background:#2563eb;}

/* FLOAT BUTTONS */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25d366;
padding:18px;
border-radius:50%;
font-size:20px;
box-shadow:0 0 10px #000;
}

.callbtn{
position:fixed;
bottom:90px;
right:20px;
background:#ef4444;
padding:15px;
border-radius:50%;
font-size:18px;
}

/* BOOK NOW FLOAT BIG */
.booknow{
position:fixed;
bottom:20px;
left:20px;
background:#3b82f6;
color:#fff;
padding:15px 20px;
border-radius:30px;
font-weight:bold;
box-shadow:0 0 10px #000;
}

/* POPUP */
#popup,#adminPanel{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
}
.popup-box{
background:#111c44;
border:1px solid #3b82f6;
width:90%;
max-width:400px;
margin:100px auto;
padding:20px;
border-radius:15px;
text-align:center;
}
</style>

<script>
var bookings = JSON.parse(localStorage.getItem("bookings")) || [];

function generateID(){
return "ST" + Math.floor(Math.random()*100000);
}

function saveBooking(data){
bookings.push(data);
localStorage.setItem("bookings",JSON.stringify(bookings));
}

function showTripInfo(){
var trip=document.getElementById("trip").value;
if(trip=="Round Trip"){
document.getElementById("tripInfo").innerHTML="✔ 300KM/Day | Driver Allowance Extra";
}else{
document.getElementById("tripInfo").innerHTML="";
}
}

function sendWhatsApp(){

var id = generateID();

var name=document.getElementById("name").value;
var phone=document.getElementById("phone").value;
var trip=document.getElementById("trip").value;
var pickup=document.getElementById("pickup").value;
var drop=document.getElementById("drop").value;
var car=document.getElementById("carType").value;
var date=document.getElementById("date").value;
var time=document.getElementById("time").value;

if(phone.length!=10){alert("Enter valid number");return;}
if(name==""||pickup==""||drop==""){alert("Fill all details");return;}

saveBooking({id,name,phone,trip,pickup,drop,car,date,time});

var msg="🚕 *Shivam Travels Booking* %0A"
+"🆔 ID: "+id+"%0A"
+"👤 Name: "+name+"%0A"
+"📞 Phone: "+phone+"%0A"
+"🛣️ Trip: "+trip+"%0A"
+"🚗 Car: "+car+"%0A"
+"📍 Pickup: "+pickup+"%0A"
+"🏁 Drop: "+drop+"%0A"
+"📅 Date: "+date+"%0A"
+"⏰ Time: "+time;

window.open("https://wa.me/919898222313?text="+msg);

document.getElementById("popupText").innerHTML=
"Booking ID: "+id+"<br>"+trip+"<br>"+pickup+" ➜ "+drop;

document.getElementById("popup").style.display="block";
}

function closePopup(){document.getElementById("popup").style.display="none";}
</script>

</head>

<body>

<header>
<h1>🚕 Shivam Travels</h1>
<p>Safe, Reliable & Budget-Friendly Travels in Gujarat</p>
</header>

<!-- WHY CHOOSE US -->
<div class="box">
<h2>⭐ Why Choose Us</h2>

<p>✔ 24/7 Service Available</p>
<p>✔ Safe & Secure Travel</p>
<p>✔ On Time Pickup Guarantee</p>
<p>✔ Affordable Price</p>

</div>

<!-- CONTACT -->
<div class="box" style="text-align:center;">
<h3>📞 CALL: 9898222313</h3>

<a href="tel:9898222313"><button class="btn">📞 Call Now</button></a>
<a href="https://wa.me/919898222313" target="_blank">
<button class="btn">💬 Book on WhatsApp</button></a>
</div>

<!-- BOOK -->
<div class="box">
<h2>📋 Book Taxi</h2>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone Number">

<select id="trip" onchange="showTripInfo()">
<option>One Way</option>
<option>Round Trip</option>
</select>

<p id="tripInfo" style="color:#3b82f6;"></p>

<select id="carType">
<option>Dzire</option>
<option>Aura</option>
<option>Ertiga</option>
<option>Innova</option>
<option>Innova Crysta</option>
</select>

<input id="pickup" placeholder="Pickup City">
<input id="drop" placeholder="Drop City">

<input type="date" id="date">
<input type="time" id="time">

<button class="btn" onclick="sendWhatsApp()">Confirm Booking</button>
</div>

<!-- FLOAT BUTTONS -->
<a href="https://wa.me/919898222313" class="whatsapp">💬</a>
<a href="tel:9898222313" class="callbtn">📞</a>

<!-- EXTRA POWERFUL BUTTON -->
<a href="https://wa.me/919898222313" class="booknow">
🚕 Book Now
</a>

<!-- POPUP -->
<div id="popup">
<div class="popup-box">
<h3>Booking Confirmed</h3>
<p id="popupText"></p>
<button class="btn" onclick="closePopup()">OK</button>
</div>
</div>

<footer style="text-align:center;padding:10px;">
© Shivam Travels
</footer>

</body>
</html>
