<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shivam Travels Sihor</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0a0f2c,#000);
color:#fff;
overflow-x:hidden;
}

/* HEADER */
header{
position:sticky;top:0;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
padding:15px;text-align:center;
font-size:22px;
}

/* HERO */
.hero{
text-align:center;
padding:80px 20px;
}
.hero h1{
font-size:40px;
background:linear-gradient(#fff,#ffc107);
-webkit-background-clip:text;
color:transparent;
}

/* BUTTON */
.btn{
background:#ffc107;
color:#000;
padding:12px 25px;
border:none;border-radius:30px;
cursor:pointer;
transition:0.3s;
}
.btn:hover{
transform:scale(1.1);
box-shadow:0 0 20px #ffc107;
}

/* CAR CARDS */
.cars{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:20px;
}
.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
margin:15px;
padding:20px;
border-radius:15px;
width:260px;
text-align:center;
transition:0.4s;
}
.card:hover{
transform:translateY(-10px) scale(1.05);
box-shadow:0 0 25px #ffc107;
}

/* FORM POPUP */
form{
display:none;
position:fixed;
top:50%;left:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,0.9);
padding:20px;
border-radius:15px;
width:300px;
z-index:999;
}
input,select{
width:100%;
padding:10px;
margin:5px 0;
border:none;border-radius:5px;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
cursor:pointer;
box-shadow:0 0 15px #25D366;
}

/* ANIMATION */
.fade{
opacity:0;
transform:translateY(30px);
transition:1s;
}
.fade.show{
opacity:1;
transform:translateY(0);
}
</style>
</head>

<body>

<header>🚖 Shivam Travels Sihor</header>

<div class="hero fade">
<h1>Premium Taxi Service</h1>
<p>Safe • Fast • Luxury</p>
<button class="btn" onclick="openForm()">Book Now</button>
</div>

<div class="cars">

<div class="card fade">
<h3>Swift Dzire</h3>
<p>₹12/km | 4+1 | AC</p>
<button class="btn" onclick="openForm()">Book</button>
</div>

<div class="card fade">
<h3>Hyundai Aura</h3>
<p>₹13/km | 4+1 | AC</p>
<button class="btn" onclick="openForm()">Book</button>
</div>

<div class="card fade">
<h3>Ertiga</h3>
<p>₹16/km | 6+1 | AC</p>
<button class="btn" onclick="openForm()">Book</button>
</div>

<div class="card fade">
<h3>Innova</h3>
<p>₹20/km | 7+1 | AC</p>
<button class="btn" onclick="openForm()">Book</button>
</div>

</div>

<form id="form">
<h3>Book Taxi</h3>
<input placeholder="Name">
<input placeholder="Mobile">
<input placeholder="Pickup">
<input placeholder="Drop">
<input type="date">
<input type="time">
<select>
<option>One Way</option>
<option>Round Trip</option>
</select>
<button class="btn" onclick="submit()">Submit</button>
<button onclick="closeForm()">Close</button>
</form>

<div class="whatsapp" onclick="whatsapp()">💬</div>

<script>
function openForm(){
document.getElementById("form").style.display="block";
}
function closeForm(){
document.getElementById("form").style.display="none";
}
function submit(){
alert("Booking Confirmed ✅");
}
function whatsapp(){
window.open("https://wa.me/919898222313");
}

/* SCROLL ANIMATION */
let items=document.querySelectorAll('.fade');
window.addEventListener('scroll',()=>{
items.forEach(el=>{
let pos=el.getBoundingClientRect().top;
if(pos<window.innerHeight-100){
el.classList.add('show');
}
});
});
</script>

</body>
</html>
