<!DOCTYPE html>

<head>

<style>
body {
font-family: Arial;
margin:0;
background: linear-gradient(45deg,#000,#ffc107);
}

/* HEADER */
header {
background:#111;
color:white;
text-align:center;
padding:50px 20px;
}

/* BOX */
.box {
background: rgba(255,255,255,0.92);
margin:15px;
padding:20px;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

input, select {
width:100%;
padding:10px;
margin:5px 0;
}

/* BUTTON */
.btn {
background:#28a745;
color:white;
padding:10px;
border:none;
border-radius:5px;
cursor:pointer;
margin-top:5px;
}

/* FLOAT BUTTONS */
.whatsapp {
position:fixed;
bottom:20px;
right:20px;
background:#25d366;
color:white;
padding:15px;
border-radius:50%;
}

.callbtn {
position:fixed;
bottom:80px;
right:20px;
background:red;
color:white;
padding:12px;
border-radius:50%;
}

/* POPUP */
#popup {
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

.popup-box {
background:white;
width:80%;
max-width:350px;
margin:150px auto;
padding:20px;
border-radius:15px;
text-align:center;
}
</style>

<script>
function calculateFare(){
var km = document.getElementById('km').value;
var car = document.getElementById('car').value;

var rate = 10;
if(car=="Ertiga") rate = 13;
if(car=="Innova") rate = 19;

document.getElementById('result').innerHTML =
"Total Price: ₹" + (km * rate);
}

function sendWhatsApp(){

var name = document.getElementById('name').value;
var pickup = document.getElementById('pickup').value;
var drop = document.getElementById('drop').value;
var date = document.getElementById('date').value;
var time = document.getElementById('time').value;
var phone = document.getElementById('phone').value;

var message =
"🚕 Taxi Booking%0A"
+ "Name: " + name + "%0A"
+ "Pickup: " + pickup + "%0A"
+ "Drop: " + drop + "%0A"
+ "Date: " + date + "%0A"
+ "Time: " + time + "%0A"
+ "Phone: " + phone;

window.open("https://wa.me/919898222313?text=" + message);

/* POPUP */
document.getElementById("popupText").innerHTML =
"<b>Name:</b> " + name + "<br>"
+ "<b>Pickup:</b> " + pickup + "<br>"
+ "<b>Drop:</b> " + drop + "<br>"
+ "<b>Date:</b> " + date + "<br>"
+ "<b>Time:</b> " + time;

document.getElementById("popup").style.display = "block";
}

function closePopup(){
document.getElementById("popup").style.display = "none";
}
</script>

</head>

<body>

<header>

<!-- SERVICES -->
<div class="box">

<div class="box">

<option>Aura</option>
<option>Ertiga</option>
<option>Innova</option>
</select>
<button class="btn" onclick="calculateFare()">Calculate</button>

<!-- BOOKING -->
<div class="box">

<input id="name" placeholder="Name">
<input id="pickup" placeholder="Pickup">
<input id="drop" placeholder="Drop">

<input type="date" id="date">
<input type="time" id="time">

<input id="phone" placeholder="Phone">

<button class="btn" onclick="sendWhatsApp()">Book Now</button>
</div>

<!-- PAYMENT -->
<div class="box">
<h2>💰 Pay Online</h2>
<p><b>UPI ID:</b> chauhanshivam2535-1@okicici</p>
<a href="upi://pay?pa=chauhanshivam2535-1@okicici&pn=Shivam%20Travels&cu=INR">
<button class="btn">Pay Now</button>
</a>
</div>

<!-- LOCATION -->
<div class="box">
<h2>📍 Location</h2>
<iframe src="https://www.google.com/maps?q=Sihor,Gujarat&output=embed"
width="100%" height="250"></iframe>
</div>

<footer style="background:#111;color:white;text-align:center;padding:15px;">
© Shivam Travels
</footer>

<!-- FLOAT BUTTONS -->
<a href="https://wa.me/919898222313" class="whatsapp">💬</a>

</div>

</body>
