<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shivam Travels | Pro Admin</title>

<style>
body{margin:0;font-family:Arial;background:#000;color:#fff;}
header{background:linear-gradient(90deg,#000,#222,#ffc107);padding:40px;text-align:center;}
.box{background:#111;margin:15px;padding:20px;border-radius:15px;border:1px solid #ffc107;}
input,select,textarea{width:100%;padding:10px;margin:5px 0;border:none;border-radius:5px;}
.btn{background:#ffc107;color:#000;padding:10px;border:none;border-radius:5px;font-weight:bold;cursor:pointer;}
.whatsapp{position:fixed;bottom:20px;right:20px;background:#25d366;padding:15px;border-radius:50%;}
.callbtn{position:fixed;bottom:80px;right:20px;background:red;padding:12px;border-radius:50%;}
#popup,#adminPanel{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);}
.popup-box{background:#111;border:1px solid #ffc107;width:90%;max-width:400px;margin:100px auto;padding:20px;border-radius:15px;text-align:center;}
</style>

<script>

/* STORAGE */
var bookings = JSON.parse(localStorage.getItem("bookings")) || [];

/* BOOKING ID */
function generateID(){
return "ST" + Math.floor(Math.random()*100000);
}

/* SAVE */
function saveBooking(data){
bookings.push(data);
localStorage.setItem("bookings",JSON.stringify(bookings));
}

/* BOOK */
function sendWhatsApp(){

var id = generateID();

var name=document.getElementById("name").value;
var phone=document.getElementById("phone").value;
var pickup=document.getElementById("pickup").value;
var drop=document.getElementById("drop").value;
var car=document.getElementById("carType").value;
var date=document.getElementById("date").value;
var time=document.getElementById("time").value;

/* VALIDATION */
if(phone.length!=10){
alert("Enter valid 10 digit number");
return;
}

if(name=="" || pickup=="" || drop==""){
alert("Fill all details");
return;
}

/* SAVE DATA */
saveBooking({id,name,phone,pickup,drop,car,date,time});

/* WHATSAPP MESSAGE */
var msg="🚕 *Shivam Travels Booking* %0A"
+"🆔 ID: "+id+"%0A"
+"👤 Name: "+name+"%0A"
+"📞 Phone: "+phone+"%0A"
+"🚗 Car: "+car+"%0A"
+"📍 Pickup: "+pickup+"%0A"
+"🏁 Drop: "+drop+"%0A"
+"📅 Date: "+date+"%0A"
+"⏰ Time: "+time;

window.open("https://wa.me/919898222313?text="+msg);

/* POPUP */
document.getElementById("popupText").innerHTML=
"ID: "+id+"<br>"+pickup+" ➜ "+drop;

document.getElementById("popup").style.display="block";
}

/* ADMIN */
function openAdmin(){
var pass = prompt("Enter Admin Password");
if(pass=="1234"){
loadBookings();
document.getElementById("adminPanel").style.display="block";
}else{
alert("Wrong Password");
}
}

function loadBookings(){
var html="";
bookings.forEach((b,i)=>{
html+=`<div style="border-bottom:1px solid #555;padding:10px">
<b>${b.id}</b><br>
${b.name} (${b.phone})<br>
${b.pickup} ➜ ${b.drop}<br>
${b.date} | ${b.time}
<br><button onclick="deleteBooking(${i})">Delete</button>
</div>`;
});
document.getElementById("adminData").innerHTML=html;
}

function deleteBooking(i){
bookings.splice(i,1);
localStorage.setItem("bookings",JSON.stringify(bookings));
loadBookings();
}

/* REVIEW */
function addReview(){
var name=document.getElementById("custName").value;
var rating=document.getElementById("rating").value;
var text=document.getElementById("reviewText").value;

document.getElementById("reviewList").innerHTML +=
"<p><b>"+name+"</b> ⭐"+rating+"<br>"+text+"</p>";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}
function closeAdmin(){
document.getElementById("adminPanel").style.display="none";
}

</script>

</head>

<body>

<header>
<h1>🚕 Shivam Travels</h1>
<p>Smart Taxi Booking System</p>
<button class="btn" onclick="openAdmin()">Admin Panel</button>
</header>

<!-- BOOK -->
<div class="box">
<h2>📋 Book Taxi</h2>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone Number">

<select id="carType">
<option>Dzire</option>
<option>Aura</option>
<option>Ertiga</option>
<option>Innova</option>
<option>Innova Crysta</option>
</select>

<input id="pickup" placeholder="Pickup City">
<input id="drop" placeholder="Drop City">

<input type="date" id="date">
<input type="time" id="time">

<button class="btn" onclick="sendWhatsApp()">Confirm Booking</button>
</div>

<!-- PAYMENT -->
<div class="box">
<h2>💰 Online Payment</h2>
<p style="color:#ffc107;">UPI: chauhanshivam2535-1@okicici</p>
<a href="upi://pay?pa=chauhanshivam2535-1@okicici&pn=Shivam%20Travels">
<button class="btn">Pay Now</button>
</a>
</div>

<!-- REVIEW -->
<div class="box">
<h2>⭐ Customer Reviews</h2>
<input id="custName" placeholder="Name">
<select id="rating">
<option value="5">⭐⭐⭐⭐⭐</option>
<option value="4">⭐⭐⭐⭐</option>
<option value="3">⭐⭐⭐</option>
<option value="2">⭐⭐</option>
<option value="1">⭐</option>
</select>
<textarea id="reviewText"></textarea>
<button class="btn" onclick="addReview()">Submit</button>
<div id="reviewList"></div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
<div class="popup-box">
<h2>📊 Booking History</h2>
<div id="adminData"></div>
<button class="btn" onclick="closeAdmin()">Close</button>
</div>
</div>

<!-- POPUP -->
<div id="popup">
<div class="popup-box">
<h3>Booking Confirmed</h3>
<p id="popupText"></p>
<button class="btn" onclick="closePopup()">OK</button>
</div>
</div>

<footer style="text-align:center;padding:10px;">
© Shivam Travels
</footer>

<a href="https://wa.me/919898222313" class="whatsapp">💬</a>
<a href="tel:9898222313" class="callbtn">📞</a>

</body>
</html>
