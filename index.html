<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shivam Travels Sihor</title>

<style>
body {
font-family: Arial;
margin:0;
background: linear-gradient(45deg,#000,#ffc107);
}

/* HEADER */
header {
text-align:center;
color:white;
padding:20px;
background:#000;
}

header img {width:200px;}

/* SLIDER */
.slider {
position: relative;
height: 250px;
overflow: hidden;
}

.slide {
position:absolute;
width:100%;
height:250px;
object-fit:cover;
opacity:0;
transition:1s;
}

.slide.active {opacity:1;}

/* BUTTON */
.btn {
background:#28a745;
color:white;
padding:10px;
border:none;
border-radius:5px;
margin:5px;
cursor:pointer;
}

/* BOX */
.box {
background:rgba(255,255,255,0.9);
margin:15px;
padding:20px;
border-radius:15px;
opacity:0;
transform:translateY(50px);
transition:0.5s;
}

.box.show {
opacity:1;
transform:translateY(0);
}

/* INPUT */
input, select {
width:100%;
padding:10px;
margin:5px 0;
}

/* FOOTER */
footer {
background:#111;
color:white;
text-align:center;
padding:15px;
}

/* FLOAT BUTTONS */
.whatsapp {
position:fixed;
bottom:20px;
right:20px;
background:#25d366;
color:white;
padding:15px;
border-radius:50%;
}

.callbtn {
position:fixed;
bottom:80px;
right:20px;
background:red;
color:white;
padding:12px;
border-radius:50%;
}

/* POPUP */
.popup {
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
}

.popup-content {
background:white;
padding:20px;
margin:100px auto;
width:80%;
border-radius:10px;
text-align:center;
}
</style>
</head>

<body>

<header>
<img src="logo.png">
<h1>Shivam Travels Sihor</h1>
<p>Best Taxi Service in Sihor</p>

<a href="tel:9898222313"><button class="btn">📞 Call Now</button></a>
<a href="https://wa.me/919898222313"><button class="btn">💬 WhatsApp</button></a>
</header>

<!-- SLIDER -->
<div class="slider">
<img src="car1.jpg" class="slide active">
<img src="car2.jpg" class="slide">
<img src="car3.jpg" class="slide">
</div>

<div class="box">
<h2>🚕 Our Services</h2>
<p>✔ Local Taxi</p>
<p>✔ Outstation</p>
<p>✔ Airport Pickup</p>
</div>

<div class="box">
<h2>📊 Fare Calculator</h2>
<input type="number" id="km" placeholder="Enter KM">
<select id="car">
<option>Dzire</option>
<option>Aura</option>
<option>Ertiga</option>
<option>Innova</option>
</select>
<button class="btn" onclick="calculateFare()">Calculate</button>
<p id="result"></p>
</div>

<div class="box">
<h2>📋 Book Taxi</h2>
<input id="name" placeholder="Name">
<input id="pickup" placeholder="Pickup">

<button class="btn" onclick="sendWhatsApp()">Book Now</button>
</div>

<div class="box">
<h2>💰 Pay Online</h2>
<a href="upi://pay?pa=9898222313@upi&pn=Shivam%20Travels&am=500">
<button class="btn">Pay ₹500</button>
</a>
</div>

<div class="box">
<h2>📍 Location</h2>
<iframe src="https://www.google.com/maps?q=Sihor,Gujarat&output=embed" width="100%" height="250"></iframe>
</div>

<footer>
<p>© Shivam Travels</p>
</footer>

<!-- POPUP -->
<div id="popup" class="popup">
<div class="popup-content">
<h2>Book Taxi 🚕</h2>
<input id="pname" placeholder="Name">
<input id="pphone" placeholder="Phone">
<button onclick="sendPopup()">Book</button>
<button onclick="closePopup()">Close</button>
</div>
</div>

<a href="https://wa.me/919898222313" class="whatsapp">💬</a>
<a href="tel:9898222313" class="callbtn">📞</a>

<script>
// SLIDER
let index = 0;
const slides = document.querySelectorAll(".slide");

setInterval(()=>{
slides[index].classList.remove("active");
index=(index+1)%slides.length;
slides[index].classList.add("active");
},3000);

// ANIMATION
const boxes = document.querySelectorAll(".box");
window.addEventListener("scroll", ()=>{
boxes.forEach(box=>{
if(box.getBoundingClientRect().top < window.innerHeight-50){
box.classList.add("show");
}
});
});

// FARE
function calculateFare(){
var km=document.getElementById('km').value;
var car=document.getElementById('car').value;
var rate=0;
if(car=="Dzire"||car=="Aura") rate=10;
if(car=="Ertiga") rate=13;
if(car=="Innova") rate=19;
document.getElementById('result').innerHTML="₹"+(km*rate);
}

// WHATSAPP
function sendWhatsApp(){
var name=document.getElementById('name').value;
var pickup=document.getElementById('pickup').value;
var drop=document.getElementById('drop').value;
var date=document.getElementById('date').value;
var phone=document.getElementById('phone').value;

var msg="Taxi Booking%0AName:"+name+"%0APickup:"+pickup+"%0ADrop:"+drop+"%0ADate:"+date+"%0APhone:"+phone;
window.open("https://wa.me/919898222313?text="+msg);
}

// POPUP
setTimeout(()=>{
document.getElementById("popup").style.display="block";
},3000);

function closePopup(){
document.getElementById("popup").style.display="none";
}

function sendPopup(){
var name=document.getElementById("pname").value;
var phone=document.getElementById("pphone").value;
var msg="Booking%0AName:"+name+"%0APhone:"+phone;
window.open("https://wa.me/919898222313?text="+msg);
}
</script>

</body>
</html>
