header{

.btn{
background:#28a745;

section{padding:15px;}

input{

/* ================= CAR 3D SLIDER ================= */
.slider{
position:relative;
width:100%;
height:300px;
perspective:1200px;
overflow:hidden;
border-radius:15px;
background:#000;
}

.slider::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:#000;
filter:blur(25px);
opacity:0.4;
z-index:0;
}

.slide{
position:absolute;
width:80%;
left:10%;
top:20px;
text-align:center;
opacity:0;
transform:scale(0.6) translateY(40px) rotateY(40deg);
transition:all 1s ease;
z-index:1;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.slide img{
width:100%;
height:180px;
object-fit:cover;
border-radius:12px;
}

.slide h4{
margin:10px 0;
color:white;
}

.active{
opacity:1;
transform:scale(1) translateY(0) rotateY(0deg);
z-index:5;
box-shadow:0 20px 50px rgba(0,255,150,0.3);
}

.left{
opacity:0.4;
transform:translateX(-140px) scale(0.7) rotateY(45deg);
}

.right{
opacity:0.4;
transform:translateX(140px) scale(0.7) rotateY(-45deg);
}

/* FLOAT BUTTONS */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25d366;
color:white;
padding:15px;
border-radius:50%;
text-decoration:none;
}

.callbtn{
position:fixed;
bottom:80px;
right:20px;
background:red;
color:white;
padding:12px;
border-radius:50%;
text-decoration:none;
}
</style>

<script>
let slides = document.querySelectorAll(".slide");
let index = 0;

function showSlider(){

slides.forEach(s=>{
s.classList.remove("active","left","right");
});

slides[index].classList.add("active");

if(index-1 >= 0){
slides[index-1].classList.add("left");
}

if(index+1 < slides.length){
slides[index+1].classList.add("right");
}

index++;
if(index >= slides.length){
index = 0;
}

setTimeout(showSlider,3000);
}

showSlider();

function sendWhatsApp(){
let name=document.getElementById("name").value;
let pickup=document.getElementById("pickup").value;
let drop=document.getElementById("drop").value;
let date=document.getElementById("date").value;
let time=document.getElementById("time").value;
let phone=document.getElementById("phone").value;

let msg=
`Taxi Booking%0AName: ${name}%0APickup: ${pickup}%0ADrop: ${drop}%0ADate: ${date}%0ATime: ${time}%0APhone: ${phone}`;

window.open("https://wa.me/919898222313?text="+msg);
}
</script>
