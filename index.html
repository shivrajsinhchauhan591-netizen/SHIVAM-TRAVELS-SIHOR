<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shivam Travels</title>

<style>
body{font-family:Arial;margin:0;background:linear-gradient(45deg,#000,#ffc107);}
header{background:#111;color:#fff;text-align:center;padding:40px;}
.box{background:#fff;margin:15px;padding:20px;border-radius:15px;}
input,select,textarea{width:100%;padding:10px;margin:5px 0;}
.btn{background:#28a745;color:#fff;padding:10px;border:none;border-radius:5px;}
.whatsapp{position:fixed;bottom:20px;right:20px;background:#25d366;padding:15px;border-radius:50%;color:#fff;}
.callbtn{position:fixed;bottom:80px;right:20px;background:red;padding:12px;border-radius:50%;color:#fff;}
#popup,#reviewPopup{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);}
.popup-box{background:#fff;width:80%;max-width:350px;margin:120px auto;padding:20px;border-radius:15px;text-align:center;}
</style>

<script>

/* ================= TRIP INFO ================= */
function showTripInfo(){
var trip=document.getElementById("trip").value;

if(trip=="Round Trip"){
document.getElementById("tripInfo").innerHTML=
"✔ One Day 300KM Range + Driver D.A + Toll Tax + Parking + Border Tax + ETC";
}else{
document.getElementById("tripInfo").innerHTML="";
}
}

/* ================= FARE CALCULATOR ================= */
function calculateFare(){

var km=parseInt(document.getElementById("km").value)||0;
var days=parseInt(document.getElementById("days").value)||1;
var car=document.getElementById("car").value;
var trip=document.getElementById("tripCalc").value;

var rate=0;

if(car=="Dzire"||car=="Aura") rate=10;
if(car=="Ertiga") rate=13;
if(car=="Innova") rate=18;
if(car=="Innova Crysta") rate=19;

var total=0;

if(trip=="Round Trip"){

var minKM=300*days;
if(km<minKM){ km=minKM; }

var driverDA=300*days;

total=(km*rate)+driverDA;

document.getElementById("extraInfo").innerHTML=
"✔ "+days+" Day Package ("+minKM+" KM Min) + Driver D.A + Toll + Parking + Border Tax EXTRA";

}else{
total=km*rate;
document.getElementById("extraInfo").innerHTML="";
}

document.getElementById("result").innerHTML="💰 Total Fare: ₹ "+total;
}

/* ================= BOOKING ================= */
function sendWhatsApp(){

var name=document.getElementById("name").value;
var trip=document.getElementById("trip").value;
var car=document.getElementById("carType").value;
var pickup=document.getElementById("pickup").value;
var drop=document.getElementById("drop").value;
var date=document.getElementById("date").value;
var time=document.getElementById("time").value;
var phone=document.getElementById("phone").value;

var msg="🚕 Taxi Booking%0A"
+"Name:"+name+"%0A"
+"Trip:"+trip+"%0A"
+"Car:"+car+"%0A"
+"Pickup:"+pickup+"%0A"
+"Drop:"+drop+"%0A"
+"Date:"+date+"%0A"
+"Time:"+time+"%0A"
+"Phone:"+phone;

window.open("https://wa.me/919898222313?text="+msg);

document.getElementById("popupText").innerHTML=
name+"<br>"+trip+"<br>"+car+"<br>"+pickup+" ➜ "+drop;

document.getElementById("popup").style.display="block";
}

/* ================= REVIEWS ================= */
function addReview(){

var name=document.getElementById("custName").value;
var rating=document.getElementById("rating").value;
var text=document.getElementById("reviewText").value;

var stars="⭐".repeat(rating);

var html="<div style='background:#eee;padding:10px;margin:5px;border-radius:10px'>"
+"<b>"+name+"</b><br>"+stars+"<br>"+text+"</div>";

document.getElementById("reviewList").innerHTML+=html;

closeReviewPopup();
}

/* ================= POPUPS ================= */
function closePopup(){document.getElementById("popup").style.display="none";}
function openReviewPopup(){document.getElementById("reviewPopup").style.display="block";}
function closeReviewPopup(){document.getElementById("reviewPopup").style.display="none";}

window.onload=function(){
setTimeout(openReviewPopup,4000);
}

</script>

</head>

<body>

<header>
<h1>🚕 Shivam Travels</h1>
<p>Best Taxi Service</p>
</header>

<!-- BOOK TAXI -->
<div class="box">
<h2>📋 Book Taxi</h2>

<input id="name" placeholder="Name">

<select id="trip" onchange="showTripInfo()">
<option>One Way</option>
<option>Round Trip</option>
</select>

<p id="tripInfo" style="color:green;font-weight:bold;"></p>

<select id="carType">
<option>Dzire</option>
<option>Aura</option>
<option>Ertiga</option>
<option>Innova</option>
<option>Innova Crysta</option>
</select>

<input id="pickup" placeholder="Pickup">
<input id="drop" placeholder="Drop">

<input type="date" id="date">
<input type="time" id="time">

<input id="phone" placeholder="Phone">

<button class="btn" onclick="sendWhatsApp()">Book Now</button>
</div>

<!-- FARE CALCULATOR -->
<div class="box">
<h2>📊 Fare Calculator</h2>

<select id="tripCalc" onchange="calculateFare()">
<option>One Way</option>
<option>Round Trip</option>
</select>

<input type="number" id="km" placeholder="Enter KM">
<input type="number" id="days" placeholder="Enter Days (Round Trip)">

<select id="car" onchange="calculateFare()">
<option>Dzire</option>
<option>Aura</option>
<option>Ertiga</option>
<option>Innova</option>
<option>Innova Crysta</option>
</select>

<button class="btn" onclick="calculateFare()">Calculate</button>

<p id="result"></p>
<p id="extraInfo" style="color:green;font-weight:bold;"></p>
</div>

<!-- REVIEWS -->
<div class="box">
<h2>⭐ Customer Reviews</h2>

<input id="custName" placeholder="Name">
<select id="rating">
<option value="5">⭐⭐⭐⭐⭐</option>
<option value="4">⭐⭐⭐⭐</option>
<option value="3">⭐⭐⭐</option>
<option value="2">⭐⭐</option>
<option value="1">⭐</option>
</select>

<textarea id="reviewText" placeholder="Review"></textarea>

<button class="btn" onclick="addReview()">Submit</button>

<div id="reviewList"></div>
</div>

<footer style="background:#111;color:#fff;text-align:center;padding:10px;">
© Shivam Travels
</footer>

<a href="https://wa.me/919898222313" class="whatsapp">💬</a>
<a href="tel:9898222313" class="callbtn">📞</a>

<!-- BOOKING POPUP -->
<div id="popup">
<div class="popup-box">
<h3>Booking Confirmed ✅</h3>
<p id="popupText"></p>
<button class="btn" onclick="closePopup()">OK</button>
</div>
</div>

<!-- REVIEW POPUP -->
<div id="reviewPopup">
<div class="popup-box">
<h3>⭐ Give Review</h3>

<input id="custName" placeholder="Name">
<select id="rating">
<option value="5">⭐⭐⭐⭐⭐</option>
<option value="4">⭐⭐⭐⭐</option>
<option value="3">⭐⭐⭐</option>
<option value="2">⭐⭐</option>
<option value="1">⭐</option>
</select>

<textarea id="reviewText" placeholder="Review"></textarea>

<button class="btn" onclick="addReview()">Submit</button>
<button class="btn" onclick="closeReviewPopup()">Close</button>

</div>
</div>

</body>
</html>
